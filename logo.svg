      <!-- 대각선 몸체 -->
      <line x1="188" y1="51" x2="110" y2="89"
            stroke="white" stroke-width="22" stroke-linecap="round"/>
      <!-- 하단 바 -->
      <line x1="103" y1="91" x2="197" y2="91"
