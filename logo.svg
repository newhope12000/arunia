  </defs>

  <!-- 실제 렌더링: 각 문자 영역에 마스크 적용 -->
  <rect x="2"   y="2" width="96" height="96" fill="#111111" mask="url(#m0a)"/>
  <rect x="103" y="2" width="96" height="96" fill="#111111" mask="url(#m2)"/>
  <rect x="206" y="2" width="96" height="96" fill="#111111" mask="url(#m0b)"/>
  <rect x="308" y="2" width="96" height="96" fill="#111111" mask="url(#m0c)"/>
