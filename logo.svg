      <!-- 대각선 컷 -->
      <rect x="167" y="-18" width="11" height="80" rx="3"
            transform="rotate(-30 172 22)" fill="black"/>
    </mask>

    <!-- 0 두번째 (center 254) -->
    <mask id="m0b">
      <ellipse cx="254" cy="50" rx="46" ry="47" fill="white"/>
      <ellipse cx="254" cy="50" rx="20" ry="21" fill="black"/>
      <rect x="271" y="-18" width="11" height="80" rx="3"
            transform="rotate(-30 276 22)" fill="black"/>
