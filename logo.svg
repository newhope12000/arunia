      <rect x="67" y="-18" width="11" height="80" rx="3"
            transform="rotate(-30 72 22)" fill="black"/>
    </mask>

    <!-- 2 (x 103~199) -->
    <mask id="m2">
      <!-- 상단 호 -->
      <path d="M 112 55 A 36 36 0 0 1 188 55"
