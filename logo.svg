    <!-- 0 세번째 (center 356) -->
    <mask id="m0c">
      <ellipse cx="356" cy="50" rx="46" ry="47" fill="white"/>
      <ellipse cx="356" cy="50" rx="20" ry="21" fill="black"/>
      <rect x="373" y="-18" width="11" height="80" rx="3"
